<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <link rel="icon" type="png" href="assets/logo/logo.png" >
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .loading-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem 4rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .spinner {
            width: 60px;
            height: 60px;
            margin: 0 auto 1.5rem;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }

        .progress-bar {
            width: 300px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin: 1.5rem auto 0;
        }

        .progress-fill {
            height: 100%;
            background: white;
            border-radius: 10px;
            animation: progress 3s ease-in-out forwards;
        }

        @keyframes progress {
            0% { width: 0%; }
            20% { width: 30%; }
            50% { width: 60%; }
            80% { width: 85%; }
            100% { width: 100%; }
        }

        .redirect-message {
            margin-top: 1rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .manual-link {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .manual-link a {
            color: white;
            text-decoration: underline;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .manual-link a:hover {
            opacity: 1;
        }

        .dots {
            display: none;
        }

        .dots.active {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 1.5rem 0;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            animation: bounce 0.5s ease-in-out infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.1s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.2s;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        
        <div class="spinner"></div>
        
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <h1>Loading</h1>
        <p>Please wait while we prepare your content</p>
        
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <div class="redirect-message" id="redirectMessage">
            Redirecting in <span id="countdown">3</span> seconds...
        </div>
        
        <!-- <div class="manual-link">
            <a href="#" id="manualRedirect">Click here if you're not redirected automatically</a>
        </div> -->
    </div>

    <script>
        const TARGET_PAGE = "Code/Home.html";         
        const REDIRECT_DELAY = 3000; 
        const countdownElement = document.getElementById('countdown');
        const manualLink = document.getElementById('manualRedirect');
        
  
        manualLink.href = TARGET_PAGE;
        
   
        manualLink.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = TARGET_PAGE;
        });


        let timeLeft = REDIRECT_DELAY / 1000;
        
        const countdownInterval = setInterval(() => {
            timeLeft -= 1;
            countdownElement.textContent = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(countdownInterval);
            }
        }, 1000);

        setTimeout(() => {
            window.location.href = TARGET_PAGE;
        }, REDIRECT_DELAY);
        
    </script>
</body>
</html>
